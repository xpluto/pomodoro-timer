services:
  mysql:
    image: mysql:8.0
    container_name: pomodoro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pomodoro123}
      MYSQL_DATABASE: pomodoro
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pomodoro-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:mysql://mysql:3306/pomodoro?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false"
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pomodoro123}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-secret-key-in-production}
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80
    ports:
      - "10010:10010"

  frontend:
    build: ./frontend
    container_name: pomodoro-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
