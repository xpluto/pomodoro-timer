spring:
  datasource:
    url: jdbc:h2:mem:pomodoro_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  h2:
    console:
      enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: testSecretKeyThatIsAtLeast256BitsLongForHmacSha256AlgorithmInTests!
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
